name: Deploy Backend to HuggingFace Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'README.md'
      - 'requirements.txt'
      - '.github/workflows/deploy-hf-spaces.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Create a clean orphan branch with only backend files
          git checkout --orphan hf-deploy
          
          # Remove everything
          git rm -rf .
          
          # Add back only what HF Spaces needs
          git checkout main -- backend/
          git checkout main -- Dockerfile
          git checkout main -- README.md
          git checkout main -- .gitignore
          
          # Commit
          git add -A
          git commit -m "Deploy backend to HF Spaces (backend only)"
          
          # Push to HuggingFace
          git remote add hf https://Santhoshkumarp:$HF_TOKEN@huggingface.co/spaces/Santhoshkumarp/industrial-agent-ai || true
          git push hf hf-deploy:main --force
